name: Integration Tests
on:
  schedule:
    - cron: '0 4 * * *'
  # allow everyone with write access to the repository to trigger the workflow run manually
  workflow_dispatch:
jobs:
  integration-tests:
    if: github.event_name == 'workflow_dispatch' || github.repository_owner == 'Qiskit'
    name: Run integration tests - ${{ matrix.environment }}
    runs-on: ${{ matrix.os }}
    strategy:
      # avoid cancellation of in-progress jobs if any matrix job fails
      fail-fast: false
      matrix:
        python-version: [ '3.10' ]
        os: [ "ubuntu-latest" ]
        environment: ["ibm-cloud-production", "ibm-cloud-staging" ]
    environment: ${{ matrix.environment }}
    env:
      QISKIT_IBM_TOKEN: ${{ secrets.QISKIT_IBM_TOKEN }}
      QISKIT_IBM_URL: ${{ secrets.QISKIT_IBM_URL }}
      QISKIT_IBM_INSTANCE: ${{ secrets.QISKIT_IBM_INSTANCE }}
      QISKIT_IBM_QPU: ${{ secrets.QISKIT_IBM_QPU }}
      LOG_LEVEL: DEBUG
      STREAM_LOG: True
      QISKIT_IN_PARALLEL: True
      PYTEST_ADDOPTS: "-v -s --durations=0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,performance]'
      - name: Run integration tests
        run: make integration-test
  benchmarks:
    if: github.event_name == 'workflow_dispatch' || github.repository_owner == 'Qiskit'
    name: Run benchmarks - ${{ matrix.environment }}
    runs-on: ${{ matrix.os }}
    strategy:
      # avoid cancellation of in-progress jobs if any matrix job fails
      fail-fast: false
      matrix:
        python-version: [ '3.10' ]
        os: [ "ubuntu-latest" ]
        environment: ["ibm-cloud-production", "ibm-cloud-staging" ]
    environment: ${{ matrix.environment }}
    env:
      QISKIT_IBM_TOKEN: ${{ secrets.QISKIT_IBM_TOKEN }}
      QISKIT_IBM_URL: ${{ secrets.QISKIT_IBM_URL }}
      QISKIT_IBM_INSTANCE: ${{ secrets.QISKIT_IBM_INSTANCE }}
      QISKIT_IBM_QPU: ${{ secrets.QISKIT_IBM_QPU }}
      LOG_LEVEL: DEBUG
      STREAM_LOG: True
      QISKIT_IN_PARALLEL: True
      PYTEST_ADDOPTS: "--benchmark-time-unit s"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,performance]'
      - name: Run benchmarks
        run: make benchmark
  unit-tests-lowest-versions:
    name: Run unit tests with lowest versions - python${{ matrix.python-version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        os: [ "macos-latest", "ubuntu-latest", "windows-latest" ]
        exclude:
          - os: "macos-latest"
            python-version: '3.10'
            # numpy 1.26.x does not provide cp313 wheels, and mingw-w64 compiled numpy raises
            # RuntimeWarning at test/unit/test_data_serialization::TestDataSerialization
          - os: "windows-latest"
            python-version: '3.13'
    env:
      LOG_LEVEL: DEBUG
      STREAM_LOG: True
      QISKIT_IN_PARALLEL: True
      PYTEST_ADDOPTS: "--durations=10"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install extremal-python-dependencies==0.1.0
          extremal-python-dependencies pin-dependencies-to-minimum --inplace
          pip install -e '.[test,performance,visualization]'
      - name: Run unit tests
        run: make unit-test-coverage
      - name: Report coverage to coveralls.io
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: unit-tests_python${{ matrix.python-version }}-${{ matrix.os }}
          parallel: true
          file: coverage.lcov
          fail-on-error: false
